<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard 4TM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 20px; }
        .chart-container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>Dashboard Réponses - 4 The Muslim</h1>
    <div class="chart-container">
        <canvas id="paiementChart"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="ageChart"></canvas>
    </div>

    <script>
        fetch('/responses')
            .then(res => res.json())
            .then(data => {
                // Graphique paiement
                const paiement = data.reduce((acc, item) => {
                    acc[item.paiement] = (acc[item.paiement] || 0) + 1;
                    return acc;
                }, {});
                new Chart(document.getElementById('paiementChart'), {
                    type: 'pie',
                    data: {
                        labels: Object.keys(paiement),
                        datasets: [{ data: Object.values(paiement), backgroundColor: ['#006400', '#808080'] }]
                    },
                    options: { plugins: { title: { display: true, text: 'Prêt à payer ?' } } }
                });

                // Graphique âge (exemple)
                const ages = data.reduce((acc, item) => {
                    acc[item.age] = (acc[item.age] || 0) + 1;
                    return acc;
                }, {});
                new Chart(document.getElementById('ageChart'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(ages),
                        datasets: [{ label: 'Réponses par âge', data: Object.values(ages), backgroundColor: '#006400' }]
                    },
                    options: { plugins: { title: { display: true, text: 'Répartition par âge' } } }
                });
            });
    </script>
</body>
</html>
