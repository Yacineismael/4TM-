<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Moon background -->
  <defs>
    <radialGradient id="moonGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </radialGradient>
  </defs>
  <circle cx="200" cy="100" r="80" fill="url(#moonGradient)" opacity="0.3" />
  <!-- Crescent moon overlay -->
  <path d="M200 20 A80 80 0 0 1 200 180 A60 80 0 0 0 200 20 Z" fill="#c0c0c0" opacity="0.5" />
  <!-- Text "4 THE MUSLIM" -->
  <text x="200" y="120" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#808080">
    4
    <tspan fill="#008000"> THE MUSLIM</tspan>
  </text>
  <!-- Stylish elements: stars or something -->
  <circle cx="150" cy="60" r="3" fill="#ffff00" opacity="0.8" />
  <circle cx="250" cy="80" r="2" fill="#ffff00" opacity="0.8" />
  <circle cx="180" cy="40" r="2" fill="#ffff00" opacity="0.8" />
  <circle cx="220" cy="140" r="3" fill="#ffff00" opacity="0.8" />
</svg>
